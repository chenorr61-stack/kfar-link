<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="roof1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
    <linearGradient id="roof2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- House 1 (center, large) -->
  <rect x="186" y="260" width="140" height="120" rx="6" fill="white" opacity="0.95"/>
  <polygon points="186,260 256,180 326,260" fill="url(#roof1)"/>
  <rect x="228" y="320" width="36" height="60" rx="4" fill="#0d9488"/>
  <rect x="196" y="278" width="30" height="28" rx="3" fill="#bfdbfe"/>
  <rect x="286" y="278" width="30" height="28" rx="3" fill="#bfdbfe"/>
  <!-- House 2 (left, small) -->
  <rect x="82" y="300" width="100" height="80" rx="5" fill="white" opacity="0.9"/>
  <polygon points="82,300 132,238 182,300" fill="url(#roof2)"/>
  <rect x="116" y="338" width="26" height="42" rx="3" fill="#0d9488"/>
  <rect x="90" y="314" width="22" height="20" rx="2" fill="#bfdbfe"/>
  <rect x="150" y="314" width="22" height="20" rx="2" fill="#bfdbfe"/>
  <!-- House 3 (right, small) -->
  <rect x="330" y="300" width="100" height="80" rx="5" fill="white" opacity="0.9"/>
  <polygon points="330,300 380,238 430,300" fill="url(#roof2)"/>
  <rect x="364" y="338" width="26" height="42" rx="3" fill="#0d9488"/>
  <rect x="338" y="314" width="22" height="20" rx="2" fill="#bfdbfe"/>
  <rect x="398" y="314" width="22" height="20" rx="2" fill="#bfdbfe"/>
  <!-- Ground line -->
  <rect x="60" y="378" width="392" height="4" rx="2" fill="white" opacity="0.4"/>
  <!-- People / connection dots -->
  <circle cx="256" cy="148" r="18" fill="white" opacity="0.9"/>
  <circle cx="256" cy="148" r="10" fill="url(#bg)"/>
  <!-- App name hint -->
  <text x="256" y="432" text-anchor="middle" font-family="Arial,sans-serif" font-size="38" font-weight="800" fill="white" opacity="0.95">כפר-Link</text>
</svg>
